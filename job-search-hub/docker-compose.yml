version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "3001:3001"
    env_file: .env.docker
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      FRONTEND_URL: http://localhost:5173
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      REDIRECT_URI: ${REDIRECT_URI}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      USE_SONNET_FOR_INITIAL_SYNC: ${USE_SONNET_FOR_INITIAL_SYNC:-false}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      EXTERNAL_API_TIMEOUT_MS: ${EXTERNAL_API_TIMEOUT_MS:-12000}
      RETRY_ATTEMPTS: ${RETRY_ATTEMPTS:-2}
      # Match server defaults: wide sync must search ~1 month, not 1 day (1d misses almost all mail).
      INITIAL_SYNC_LOOKBACK_DAYS: ${INITIAL_SYNC_LOOKBACK_DAYS:-30}
      DAILY_SYNC_LOOKBACK_DAYS: ${DAILY_SYNC_LOOKBACK_DAYS:-1}
      GMAIL_SYNC_MAX_RESULTS_PER_PAGE: ${GMAIL_SYNC_MAX_RESULTS_PER_PAGE:-100}
      # Raise in .env.docker if Gmail returns more matches than this (sync stops at cap).
      INITIAL_SYNC_MAX_MESSAGES: ${INITIAL_SYNC_MAX_MESSAGES:-2000}
      INCREMENTAL_SYNC_MAX_MESSAGES: ${INCREMENTAL_SYNC_MAX_MESSAGES:-500}
      SYNC_CRON: ${SYNC_CRON:-0 21 * * *}
      SYNC_CRON_TIMEZONE: ${SYNC_CRON_TIMEZONE:-}
      SYNC_PROCESSING_CONCURRENCY: ${SYNC_PROCESSING_CONCURRENCY:-6}
      SYNC_INTER_MESSAGE_DELAY_MS: ${SYNC_INTER_MESSAGE_DELAY_MS:-0}
      RATE_LIMIT_SYNC_FREE: ${RATE_LIMIT_SYNC_FREE:-3}
      RATE_LIMIT_SYNC_PRO: ${RATE_LIMIT_SYNC_PRO:-12}
      RATE_LIMIT_SYNC_ELITE: ${RATE_LIMIT_SYNC_ELITE:-30}
      RATE_LIMIT_SYNC_ADMIN: ${RATE_LIMIT_SYNC_ADMIN:-60}
      # Email Configuration
      OTP_SEND_MODE: ${OTP_SEND_MODE:-console}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@jobsearchhub.local}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Job Search Hub}
    volumes:
      - server_data:/app/server/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_BACKEND_URL: http://localhost:3001
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:5173"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5173 >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  server_data:

