services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      FRONTEND_URL: http://localhost:5173
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      REDIRECT_URI: ${REDIRECT_URI}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      EXTERNAL_API_TIMEOUT_MS: ${EXTERNAL_API_TIMEOUT_MS:-12000}
      RETRY_ATTEMPTS: ${RETRY_ATTEMPTS:-2}
      INITIAL_SYNC_LOOKBACK_DAYS: ${INITIAL_SYNC_LOOKBACK_DAYS:-180}
      DAILY_SYNC_LOOKBACK_DAYS: ${DAILY_SYNC_LOOKBACK_DAYS:-1}
      GMAIL_SYNC_MAX_RESULTS_PER_PAGE: ${GMAIL_SYNC_MAX_RESULTS_PER_PAGE:-100}
      INITIAL_SYNC_MAX_MESSAGES: ${INITIAL_SYNC_MAX_MESSAGES:-1000}
      SYNC_CRON: ${SYNC_CRON:-0 9 * * *}

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      VITE_BACKEND_URL: http://localhost:3001
