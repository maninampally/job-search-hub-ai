version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      FRONTEND_URL: http://localhost:5173
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      REDIRECT_URI: ${REDIRECT_URI}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      EXTERNAL_API_TIMEOUT_MS: ${EXTERNAL_API_TIMEOUT_MS:-12000}
      RETRY_ATTEMPTS: ${RETRY_ATTEMPTS:-2}
      INITIAL_SYNC_LOOKBACK_DAYS: ${INITIAL_SYNC_LOOKBACK_DAYS:-1}
      DAILY_SYNC_LOOKBACK_DAYS: ${DAILY_SYNC_LOOKBACK_DAYS:-1}
      GMAIL_SYNC_MAX_RESULTS_PER_PAGE: ${GMAIL_SYNC_MAX_RESULTS_PER_PAGE:-100}
      INITIAL_SYNC_MAX_MESSAGES: ${INITIAL_SYNC_MAX_MESSAGES:-1000}
      SYNC_CRON: ${SYNC_CRON:-0 9 * * *}
      SYNC_PROCESSING_CONCURRENCY: ${SYNC_PROCESSING_CONCURRENCY:-1}
      # Email Configuration
      OTP_SEND_MODE: ${OTP_SEND_MODE:-console}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@jobsearchhub.local}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Job Search Hub}
    volumes:
      - server_data:/app/server/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_BACKEND_URL: http://localhost:3001
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:5173"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5173 >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  server_data:
